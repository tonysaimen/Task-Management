version: '3.9'

services:
  mongodb:
    image: mongo:latest
    container_name: task-management-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: task-management
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - task-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-management-backend
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/task-management
      JWT_SECRET: your_jwt_secret_key_change_this_in_production
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src
    networks:
      - task-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-management-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - task-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  task-network:
    driver: bridge
